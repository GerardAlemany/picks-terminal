const eur = n => (n < 0 ? "−" : "") + "€" + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
const eur0 = n => (n < 0 ? "−" : "") + "€" + Math.abs(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
const pct = n => (n > 0 ? "+" : n < 0 ? "−" : "") + Math.abs(n).toFixed(2) + "%";
const sign = n => n > 0 ? C.green : n < 0 ? C.red : C.dim;
const signBg = n => n > 0 ? C.greenDim : n < 0 ? C.redDim : C.panel;
function calcStats(bets) {
  if (!bets.length) return {
    picks: 0,
    won: 0,
    lost: 0,
    void: 0,
    invested: 0,
    returned: 0,
    net: 0,
    yield: 0,
    avgOdds: 0,
    avgStake: 0,
    units: 0,
    winRate: 0
  };
  let won = 0,
    lost = 0,
    vd = 0,
    inv = 0,
    ret = 0,
    net = 0,
    sumOdds = 0,
    sumStake = 0;
  bets.forEach(b => {
    if (b.status === 'won') won++;else if (b.status === 'lost') lost++;else vd++;
    inv += b.invested;
    ret += b.invested + b.profit;
    net += b.profit;
    sumOdds += b.odds;
    sumStake += b.stake;
  });
  const picks = bets.length;
  return {
    picks,
    won,
    lost,
    void: vd,
    invested: Math.round(inv * 100) / 100,
    returned: Math.round(ret * 100) / 100,
    net: Math.round(net * 100) / 100,
    yield: inv > 0 ? Math.round(net / inv * 10000) / 100 : 0,
    avgOdds: Math.round(sumOdds / picks * 100) / 100,
    avgStake: Math.round(sumStake / picks * 100) / 100,
    winRate: won + lost > 0 ? Math.round(won / (won + lost) * 1000) / 10 : 0,
    units: Math.round(net / 15 * 100) / 100 // STAKE1=15€
  };
}
function dailyFromBets(bets) {
  const map = {};
  bets.forEach(b => {
    if (!map[b.dateISO]) map[b.dateISO] = {
      date: b.date,
      dateISO: b.dateISO,
      picks: 0,
      won: 0,
      lost: 0,
      void: 0,
      invested: 0,
      net: 0
    };
    const d = map[b.dateISO];
    d.picks++;
    d.invested += b.invested;
    d.net += b.profit;
    if (b.status === 'won') d.won++;else if (b.status === 'lost') d.lost++;else d.void++;
  });
  let cum = 0;
  return Object.values(map).sort((a, b) => a.dateISO.localeCompare(b.dateISO)).map(d => {
    cum += d.net;
    return {
      ...d,
      invested: Math.round(d.invested * 100) / 100,
      net: Math.round(d.net * 100) / 100,
      yield: d.invested > 0 ? Math.round(d.net / d.invested * 10000) / 100 : 0,
      cum: Math.round(cum * 100) / 100
    };
  });
}

/* ─── inferSport (JS) — espejo del motor Python ─────────────────────── */
function inferSport(pick, tipster) {
  const p = pick.toLowerCase(),
    t = (tipster || "").toLowerCase();
  if (p.startsWith("funbet")) return "Funbet";
  if (p.startsWith("supercuota") || p.startsWith("superaumento")) return "Otros";
  if (/padel|pádel|coello.*tapia|tapia.*coello/i.test(pick)) return "Pádel";
  if (/ufc|mma|boxing|boxeo|pericic/i.test(pick)) return "MMA";
  if (/geng|t1\b|navi\b|sk gaming|krx\b|chovy|kills?\b|mapa \d|valorant|csgo|dota/i.test(pick)) return "eSports";
  const combi = /combi|combo/i.test(pick);
  let te = 0,
    ba = 0,
    fo = 0;
  if (/aces?|saque|tie.break|\+\d[\.,]\d aces?|1r set|2o set|atp\b|wta\b|roland|wimbledon/i.test(pick)) te += 3;
  if (/sinner|zverev|tsitsipas|alcaraz|swiatek|sabalenka|nava|cobolli|mensik|lehecka|davidovich|prizmic|etcheverry|hanfmann|medvedev|nakashima|atmane|marozsan|blockx|shapovalov|kopriva|bublik|cerundolo|ruud|bergs|musetti|rybakina|auger|osaka|andreeva|coulibaly|michelsen|jodar/i.test(pick)) te += 2;
  if (/rebotes|asistencias|puntos\b|anotador|P\+A\+R|nba\b|nuggets|celtics|knicks|lakers|warriors|pistons|raptors|cavaliers|magic|banchero|embiid|brunson|shai|cunningham|tatum|mitchell/i.test(pick)) ba += 3;
  if (/goles?|corners?|tarjeta|dnb\b|ah\b|psg\b|barcelona|madrid|sevilla|betis|villarreal|champions|bundesliga|serie.a|premier|ligue/i.test(pick)) fo += 2;
  if (/guatefut|panenka|multiapuesta/i.test(t)) fo += 1;
  if (/marcos|santi.*atp|pensador.*wta/i.test(t)) te += 1;
  if (/rey.*analista|fembets/i.test(t)) ba += 1;
  const mx = Math.max(te, ba, fo);
  if (mx < 2) return combi ? "Combi" : "Otros";
  const sport = te === mx ? "Tenis" : ba === mx ? "Basket" : "Fútbol";
  return combi ? sport + " (combi)" : sport;
}

/* ─── global filter context ──────────────────────────────────────────── */
const GFCtx = React.createContext(null);
// liveBets state lives in App and is passed via GFCtx

function useFiltered() {
  const {
    dateFrom,
    dateTo,
    tipsterFilter,
    exFun,
    liveBets
  } = React.useContext(GFCtx);
  return useMemo(() => {
    const source = liveBets || ALL_BETS; // vivos si hay refresh, embebidos si no
    return source.filter(b => {
      if (exFun && b.funbet) return false;
      if (tipsterFilter.length > 0 && !tipsterFilter.includes(b.tipster)) return false;
      if (dateFrom && b.dateISO < dateFrom) return false;
      if (dateTo && b.dateISO > dateTo) return false;
      return true;
    });
  }, [dateFrom, dateTo, tipsterFilter, exFun, liveBets]);
}
